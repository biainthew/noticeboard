spring:
  datasource:
    url: jdbc:mysql://localhost:3306/noticeboard?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: bia
    password: bia1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8000

springdoc:
  swagger-ui:
    path: /swagger-ui

jwt:
  secret: noticeboardsecretkey12345678901234567890
  access-token-expiration: 1800000      # 30분
  refresh-token-expiration: 604800000   # 7일

logging:
  level:
    aib.noticeboard: DEBUG

cloud:
  aws:
    s3:
      bucket: noticeboard-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}